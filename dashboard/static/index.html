<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AutoHeal — Incident Console</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap');
  :root{
    --bg:#0B0E11; --panel:#12161B; --border:#232A31; --text:#E5E7EB; --muted:#7C8792;
    --safe:#34D399; --review:#FBBF24; --cyan:#5EEAD4; --danger:#F87171;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}
  .mono{font-family:'JetBrains Mono',monospace;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);background:var(--panel);}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .logo{width:10px;height:10px;border-radius:2px;background:var(--cyan);}
  .brand h1{font-family:'JetBrains Mono',monospace;font-size:16px;margin:0;letter-spacing:-0.02em;}
  .tabs{display:flex;gap:4px;align-items:center;}
  .tab{padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer;color:var(--muted);font-family:'JetBrains Mono',monospace;}
  .tab.active{background:var(--border);color:var(--text);}
  .wrap{max-width:1100px;margin:0 auto;padding:28px 20px 60px;}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px;}
  .stat{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:14px 16px;}
  .stat .n{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;}
  .stat .l{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:0.06em;margin-top:2px;}
  .stat.safe .n{color:var(--safe);} .stat.review .n{color:var(--review);} .stat.cyan .n{color:var(--cyan);}
  .log{border:1px solid var(--border);border-radius:6px;overflow:hidden;}
  .row{border-bottom:1px solid var(--border);background:var(--panel);}
  .row:last-child{border-bottom:none;}
  .row-head{display:grid;grid-template-columns:110px 1fr 120px 90px 160px;gap:12px;align-items:center;padding:12px 16px;cursor:pointer;}
  .row-head:hover{background:#161B21;}
  .time{color:var(--muted);font-size:12px;}
  .pod{font-family:'JetBrains Mono',monospace;font-size:13px;}
  .ns{color:var(--muted);}
  .badge{font-size:11px;padding:3px 8px;border-radius:3px;text-align:center;font-family:'JetBrains Mono',monospace;text-transform:uppercase;}
  .badge.safe{background:rgba(52,211,153,0.12);color:var(--safe);}
  .badge.needs_review{background:rgba(251,191,36,0.12);color:var(--review);}
  .conf{font-size:11px;color:var(--muted);text-align:center;}
  .actions{display:flex;gap:6px;justify-content:flex-end;}
  button{font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 10px;border-radius:4px;border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--text);}
  button.approve{color:var(--safe);border-color:var(--safe);}
  button.reject{color:var(--danger);border-color:var(--danger);}
  .status-badge{font-size:11px;font-family:'JetBrains Mono',monospace;padding:3px 8px;border-radius:3px;text-align:center;}
  .status-badge.applied{background:rgba(94,234,212,0.12);color:var(--cyan);}
  .status-badge.rejected{background:rgba(248,113,113,0.12);color:var(--danger);}
  .status-badge.failed{background:rgba(248,113,113,0.2);color:var(--danger);}
  .detail{padding:0 16px 16px;font-size:12px;color:var(--muted);}
  .detail p{margin:6px 0;}
  .detail pre{background:#000;padding:8px;border-radius:4px;font-size:11px;overflow-x:auto;white-space:pre-wrap;}
  .empty{padding:40px;text-align:center;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:13px;}
  .footer{margin-top:20px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px;}
  .cursor{width:7px;height:14px;background:var(--cyan);animation:blink 1s step-end infinite;}
  @keyframes blink{50%{opacity:0;}}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><div class="logo"></div><h1>AutoHeal — EKS Incident Console</h1></div>
  <div class="tabs">
    <div class="tab active" id="tab-active" onclick="switchTab('active')">Active</div>
    <div class="tab" id="tab-resolved" onclick="switchTab('resolved')">Resolved</div>
    <div class="tab" onclick="logout()">Logout (<span id="who"></span>)</div>
  </div>
</div>
<div class="wrap">
  <div class="stats" id="stats"></div>
  <div class="log" id="log"></div>
  <div class="footer"><div class="cursor"></div><span>watching self-healing-demo for pod failures...</span></div>
</div>
<script>
const token = localStorage.getItem('autoheal_token');
const currentUser = localStorage.getItem('autoheal_user');
if(!token){ window.location.href = '/login.html'; }
function authHeaders(){ return {'Authorization': 'Bearer ' + token}; }
function logout(){ localStorage.clear(); window.location.href = '/login.html'; }

let currentTab = 'active';
let expandedRows = {};

function toggleDetail(id){
  expandedRows[id] = !expandedRows[id];
  const el = document.getElementById('detail-' + id);
  if(el) el.style.display = expandedRows[id] ? 'block' : 'none';
}

function timeAgo(ts){
  const diff = Math.floor(Date.now()/1000) - ts;
  const h = Math.floor(diff/3600);
  if(h < 1) return Math.floor(diff/60) + "m ago";
  if(h < 24) return h + "h ago";
  return Math.floor(h/24) + "d ago";
}

async function approve(id, event){
  event.stopPropagation();
  await fetch(`/api/approve/${id}`, {method:'POST', headers: authHeaders()});
  load();
}
async function reject(id, event){
  event.stopPropagation();
  await fetch(`/api/reject/${id}`, {method:'POST', headers: authHeaders()});
  load();
}

function switchTab(tab){
  currentTab = tab;
  expandedRows = {};
  document.getElementById('tab-active').classList.toggle('active', tab === 'active');
  document.getElementById('tab-resolved').classList.toggle('active', tab === 'resolved');
  load();
}

async function load(){
  const endpoint = currentTab === 'active' ? '/api/alerts' : '/api/resolved';
  let data = [];
  try {
    const r = await fetch(endpoint, {headers: authHeaders()});
    data = await r.json();
  } catch(e) {}

  const stats = document.getElementById('stats');
  if(currentTab === 'active'){
    stats.innerHTML = `
      <div class="stat"><div class="n">${data.length}</div><div class="l">Pending Review</div></div>
      <div class="stat safe"><div class="n">${data.filter(d=>d.risk_level==='safe').length}</div><div class="l">Low Risk</div></div>
      <div class="stat review"><div class="n">${data.filter(d=>d.risk_level==='needs_review').length}</div><div class="l">High Risk</div></div>
      <div class="stat cyan"><div class="n">${data.filter(d=>d.confidence==='high').length}</div><div class="l">High Confidence</div></div>`;
  } else {
    stats.innerHTML = `
      <div class="stat"><div class="n">${data.length}</div><div class="l">Total Resolved</div></div>
      <div class="stat cyan"><div class="n">${data.filter(d=>d.status==='applied').length}</div><div class="l">Applied</div></div>
      <div class="stat review"><div class="n">${data.filter(d=>d.status==='rejected').length}</div><div class="l">Rejected</div></div>
      <div class="stat safe"><div class="n">${data.filter(d=>d.status==='failed').length}</div><div class="l">Failed</div></div>`;
  }

  const log = document.getElementById('log');
  if(data.length === 0){
    log.innerHTML = `<div class="empty">No ${currentTab} incidents right now.</div>`;
    return;
  }
  log.innerHTML = "";
  data.forEach(d => {
    const row = document.createElement('div');
    row.className = 'row';
    const statusCol = currentTab === 'active'
      ? `<div class="actions">
           <button class="approve" onclick="approve('${d.id}', event)">Approve</button>
           <button class="reject" onclick="reject('${d.id}', event)">Reject</button>
         </div>`
      : `<div class="status-badge ${d.status}">${d.status}</div>`;

    const ctx = d.full_context || {};
    const eventsText = (ctx.events || []).join('\n') || 'none';
    const logsText = ctx.logs || 'none';
    const limitsText = ctx.resource_limits ? JSON.stringify(ctx.resource_limits) : '-';

    row.innerHTML = `
      <div class="row-head" onclick="toggleDetail('${d.id}')">
        <div class="time mono">${timeAgo(d.time)}</div>
        <div><div class="pod">${d.kind === 'node' ? ('node/' + d.node) : d.pod} <span class="ns">&middot; ${d.reason || 'unknown'}</span></div></div>
        <div class="badge ${d.risk_level}">${(d.risk_level||'').replace('_',' ')}</div>
        <div class="conf mono">${d.confidence||'-'}</div>
        ${statusCol}
      </div>
      <div class="detail" id="detail-${d.id}" style="display:none">
        <p><strong>Root cause:</strong> ${d.root_cause||'-'}</p>
        <p><strong>Explanation:</strong> ${d.explanation||'-'}</p>
        <p><strong>Suggested fix:</strong> ${d.kubectl_command||'-'}</p>
        ${d.kind === 'node' ? `<p><strong>Instance Type:</strong> ${ctx.instance_type||'-'} | <strong>Zone:</strong> ${ctx.zone||'-'}</p>` : `<p><strong>Deployment:</strong> ${d.deployment_name||'-'} | <strong>Container:</strong> ${d.container_name||'-'}</p>`}
        <p><strong>Image:</strong> ${ctx.image||'-'}</p>
        <p><strong>Resource limits:</strong> ${limitsText}</p>
        <p><strong>Related events:</strong></p>
        <pre>${eventsText}</pre>
        <p><strong>Recent logs:</strong></p>
        <pre style="max-height:200px;">${logsText}</pre>
      </div>`;
    log.appendChild(row);
  });
}

document.addEventListener('DOMContentLoaded', () => {
  const w = document.getElementById('who');
  if(w) w.textContent = currentUser;
});

load();
setInterval(load, 10000);
</script>
</body>
</html>
