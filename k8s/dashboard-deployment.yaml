apiVersion: apps/v1
kind: Deployment
metadata:
  name: self-healing-dashboard
  namespace: self-healing-demo
spec:
  replicas: 1
  selector:
    matchLabels: {app: self-healing-dashboard}
  template:
    metadata:
      labels: {app: self-healing-dashboard}
    spec:
      containers:
      - name: dashboard
        image: arasakumar786/self-healing-bot:v1
        imagePullPolicy: Always
        command: ["python", "-m", "uvicorn", "dashboard.app:app", "--host", "0.0.0.0", "--port", "8000"]
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: self-healing-dashboard-svc
  namespace: self-healing-demo
spec:
  selector:
    app: self-healing-dashboard
  ports:
  - port: 80
    targetPort: 8000
  type: LoadBalancer
